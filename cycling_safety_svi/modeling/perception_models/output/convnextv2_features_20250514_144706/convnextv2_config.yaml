# Configuration for ConvNextV2 feature extraction model

# Dataset configuration
dataset:
  num_categories: 3  # Using low, medium, high categories
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
  mixup_alpha: 0.2  # Mixup augmentation alpha parameter
  cutmix_alpha: 0.2  # CutMix augmentation alpha parameter

# Paths configuration
paths:
  data_file: "/home/kiito/cycling_safety_svi/data/raw/perceptionratings.csv"  # Path to perception ratings CSV
  img_path: "/srv/shared/bicycle_project_roos/images_scaled"    # Path to image directory
  output_dir: "/home/kiito/cycling_safety_svi/cycling_safety_svi/modeling/perception_models/output/convnextv2_features_20250514_144706" # Directory to save results

# Training parameters
training:
  batch_size: 4  # Reduced from 16 to prevent CUDA out of memory errors
  learning_rate: 0.0001  # Adjusted for feature extraction
  weight_decay: 0.03
  patience: 10
  workers: 1
  num_epochs: 80
  warmup_epochs: 10
  warmup_type: "cosine"
  warmup_initial_factor: 0.1
  lr_decay_factor: 0.1
  scheduler_factor: 0.5
  scheduler_patience: 4
  grad_clip_value: 1.5
  mixed_precision: true  # Enable mixed precision training for memory efficiency
  label_smoothing: 0.1   # Add label smoothing

# Model architecture
model:
  model_type: "convnextv2_tiny"  # Using ConvNextV2 with feature extraction
  hidden_layers: 3
  hidden_dims: [384, 192, 96]  # Reduced feature dimensions to save memory
  dropout_rates: [0.5, 0.4, 0.3]
  freeze_backbone: true  # Freeze backbone to reduce memory usage during training
  backbone_dropout: 0.1   # Apply dropout to backbone features
  stochastic_depth_rate: 0.1  # Apply stochastic depth rate

# Hyperparameter optimization
optuna:
  use_optuna: false  # Skip hyperparameter optimization
  n_trials: 20
  trial_epochs: 10
  final_epochs: 80

# Logging and output
output:
  log_every_n_epochs: 1
  use_wandb: true
  wandb_project: "cycling-perception"
  wandb_entity: "koichi19960406"
  wandb_tags: ["convnextv2", "feature-extraction", "perception-model"]
