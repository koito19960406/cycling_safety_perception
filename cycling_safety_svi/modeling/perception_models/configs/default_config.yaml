# Default configuration file for Perception Model Training

# Dataset configuration
dataset:
  num_categories: 3  # Changed from 5 to 3 (low, medium, high)
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
  use_z_score: false  # Whether to use z-score standardization (per image normalization)

# Training parameters
training:
  batch_size: 16
  learning_rate: 5.0e-5
  weight_decay: 0.05
  patience: 7
  workers: 2
  num_epochs: 60
  warmup_epochs: 10
  lr_decay_factor: 0.1
  scheduler_factor: 0.5
  scheduler_patience: 3
  grad_clip_value: 1.0
  
# Model architecture
model:
  model_type: "convnextv2_tiny"  # Options: "deit_base" or "convnextv2_tiny"
  hidden_layers: 2
  hidden_dims: [384, 192]
  dropout_rates: [0.4, 0.3]
  freeze_backbone: true
  
# Hyperparameter optimization
optuna:
  use_optuna: false
  n_trials: 20
  trial_epochs: 10
  final_epochs: 60

# Logging and output
output:
  log_every_n_epochs: 1
  use_wandb: true
  wandb_project: "cycling-perception"
  wandb_entity: "koichi19960406"  # Set to your wandb username/entity 